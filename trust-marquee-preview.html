    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #1F3533;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Context: simulated testimonials section above */
    .context-above {
      width: 100%;
      background: #2A4542;
      padding: 40px 20px;
      text-align: center;
    }
    .context-above h2 {
      color: #FDFBF7;
      font-size: 28px;
      font-weight: 600;
      opacity: 0.3;
    }
    .context-above p {
      color: #FDFBF7;
      opacity: 0.2;
      margin-top: 8px;
      font-size: 14px;
    }

    /* ─── TRUST MARQUEE SECTION ─── */
    .trust-marquee-section {
      width: 100%;
      background: #2A4542;
      padding: 32px 0 40px;
      overflow: hidden;
      position: relative;
    }

    .trust-marquee-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }
    .trust-marquee-section::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }

    .trust-label {
      text-align: center;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(253, 251, 247, 0.35);
      margin-bottom: 24px;
    }

    .marquee-container {
      width: 100%;
      overflow: hidden;
      mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
    }

    .marquee-track {
      display: flex;
      align-items: center;
      animation: marquee-scroll 30s linear infinite;
      width: max-content;
    }

    .marquee-track:hover {
      animation-play-state: paused;
    }

    @keyframes marquee-scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .logo-item {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 48px;
      opacity: 0.6;
      transition: opacity 0.3s ease;
      flex-shrink: 0;
    }

    .logo-item:hover {
      opacity: 1;
    }

    .logo-item svg {
      height: 36px;
      width: auto;
    }

    /* Context: simulated provider section below */
    .context-below {
      width: 100%;
      background: #FDFBF7;
      padding: 60px 20px;
      text-align: center;
    }
    .context-below h2 {
      color: #2A4542;
      font-size: 28px;
      font-weight: 600;
      opacity: 0.3;
    }
    .context-below p {
      color: #2A4542;
      opacity: 0.2;
      margin-top: 8px;
      font-size: 14px;
    }

    /* Bridge transition */
    .bridge {
      width: 100%;
      height: 80px;
      background: linear-gradient(to bottom, #2A4542, #FDFBF7);
    }
  </style>
</head>
